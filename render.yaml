services:
  - type: web
    name: homecalendar-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # vložit ručně z Supabase
      - key: SECRET_KEY
        generateValue: true  # Render vygeneruje automaticky
